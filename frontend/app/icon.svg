<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#0F172A" stroke="url(#gradient)" stroke-width="4"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3E87C3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#41B8D5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- AEEIA text with underline -->
  <text x="128" y="145" font-family="Arial, sans-serif" font-size="72" font-weight="bold"
        fill="white" text-anchor="middle">AEEIA</text>

  <!-- Underline -->
  <line x1="60" y1="160" x2="196" y2="160" stroke="url(#gradient)" stroke-width="4" stroke-linecap="round"/>
</svg>
